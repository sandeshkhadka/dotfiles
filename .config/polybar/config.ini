[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[global/wm]
include-file = ~/.config/polybar/modules.ini



[bar/top]
width = 100%
height = 18pt
radius = 6
; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = monospace:size=10;2
font-1 = Hack Nerd Font:size=12;2
modules-left =  i3 xwindow
modules-right = pulseaudio backlight battery wlan powermenu
modules-center = date
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true


; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[bar/bottom]
width = 100% 
height = 18pt
radius = 6
bottom = true
wm-restack = i3

override-redirect = true
background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 1 
padding-right = 1 

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = monospace:size=10;2
font-1 = Hack Nerd Font:size=12;2
modules-left = filesystem 
modules-center = memory cpu battery-time xkeyboard



cursor-click = pointer
cursor-scroll = ns-resize
tray-position = right
enable-ipc = true


